naftiko: "1.0.0-alpha1"

info:
  label: Amazon Global Accelerator
  description: Networking service that improves application performance and availability using the AWS global network with static IP entry points.
  tags:
    - Amazon Global Accelerator
    - Networking
    - Performance
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: amazon-global-accelerator
      baseUri: https://globalaccelerator.amazonaws.com
      description: Amazon Global Accelerator API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_AUTH_HEADER}}"
        placement: header
      resources:
        - name: accelerators
          path: /accelerators
          description: Manage Global Accelerator accelerators
          operations:
            - name: ListAccelerators
              method: POST
              description: List all accelerators
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateAccelerator
              method: POST
              description: Create a new accelerator
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: DescribeAccelerator
              method: POST
              description: Get accelerator details
              inputParameters:
                - name: AcceleratorArn
                  in: body
                  type: string
                  required: true
                  description: The ARN of the accelerator
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: UpdateAccelerator
              method: POST
              description: Update accelerator configuration
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: DeleteAccelerator
              method: POST
              description: Delete an accelerator
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: listeners
          path: /listeners
          description: Manage accelerator listeners
          operations:
            - name: CreateListener
              method: POST
              description: Create a listener
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: ListListeners
              method: POST
              description: List listeners for an accelerator
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: UpdateListener
              method: POST
              description: Update a listener
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: DeleteListener
              method: POST
              description: Delete a listener
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-groups
          path: /endpoint-groups
          description: Manage listener endpoint groups
          operations:
            - name: CreateEndpointGroup
              method: POST
              description: Create an endpoint group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: ListEndpointGroups
              method: POST
              description: List endpoint groups for a listener
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: UpdateEndpointGroup
              method: POST
              description: Update an endpoint group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: DeleteEndpointGroup
              method: POST
              description: Delete an endpoint group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8081
      namespace: global-accelerator-rest-api
      resources:
        - path: /v1/accelerators
          name: accelerators
          description: Manage accelerators
          operations:
            - method: GET
              name: list-accelerators
              description: List all accelerators
              call: amazon-global-accelerator.ListAccelerators
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-accelerator
              description: Create a new accelerator
              call: amazon-global-accelerator.CreateAccelerator
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: global-accelerator-mcp
      transport: http
      tools:
        - name: list-accelerators
          description: List all Global Accelerator accelerators
          hints:
            readOnly: true
          call: amazon-global-accelerator.ListAccelerators
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-accelerator
          description: Create a new Global Accelerator accelerator
          hints:
            readOnly: false
          call: amazon-global-accelerator.CreateAccelerator
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-accelerator
          description: Get details about a specific accelerator
          hints:
            readOnly: true
          call: amazon-global-accelerator.DescribeAccelerator
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-listener
          description: Create a listener for an accelerator
          hints:
            readOnly: false
          call: amazon-global-accelerator.CreateListener
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-endpoint-group
          description: Create an endpoint group for a listener
          hints:
            readOnly: false
          call: amazon-global-accelerator.CreateEndpointGroup
          outputParameters:
            - type: object
              mapping: "$."
