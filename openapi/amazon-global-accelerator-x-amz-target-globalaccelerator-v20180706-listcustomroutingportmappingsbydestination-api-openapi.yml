components:
  schemas:
    InvalidArgumentException: {}
    ListCustomRoutingPortMappingsByDestinationRequest:
      type: object
      required:
      - EndpointId
      - DestinationAddress
      title: ListCustomRoutingPortMappingsByDestinationRequest
      properties:
        EndpointId:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The ID for the virtual private cloud (VPC) subnet.
        DestinationAddress:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The endpoint IP address in a virtual private cloud (VPC) subnet for which you want to receive back port mappings.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/PortMappingsMaxResults'
          - description: The number of destination port mappings that you want to return with this call. The default value is 10.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The token for the next set of results. You receive this token from a previous call.
    SocketAddresses:
      type: array
      items:
        $ref: '#/components/schemas/SocketAddress'
    ListCustomRoutingPortMappingsByDestinationResponse:
      type: object
      properties:
        DestinationPortMappings:
          allOf:
          - $ref: '#/components/schemas/DestinationPortMappings'
          - description: The port mappings for the endpoint IP address that you specified in the request.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The token for the next set of results. You receive this token from a previous call.
    DestinationPortMappings:
      type: array
      items:
        $ref: '#/components/schemas/DestinationPortMapping'
    PortMappingsMaxResults:
      type: integer
      minimum: 1
      maximum: 20000
    SocketAddress:
      type: object
      properties:
        IpAddress:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The IP address for the socket address.
        Port:
          allOf:
          - $ref: '#/components/schemas/PortNumber'
          - description: The port for the socket address.
      description: An IP address/port combination.
    GenericString:
      type: string
      maxLength: 255
    DestinationPortMapping:
      type: object
      properties:
        AcceleratorArn:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The Amazon Resource Name (ARN) of the custom routing accelerator that you have port mappings for.
        AcceleratorSocketAddresses:
          allOf:
          - $ref: '#/components/schemas/SocketAddresses'
          - description: The IP address/port combinations (sockets) that map to a given destination socket address.
        EndpointGroupArn:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The Amazon Resource Name (ARN) of the endpoint group.
        EndpointId:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The ID for the virtual private cloud (VPC) subnet.
        EndpointGroupRegion:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The Amazon Web Services Region for the endpoint group.
        DestinationSocketAddress:
          allOf:
          - $ref: '#/components/schemas/SocketAddress'
          - description: The endpoint IP address/port combination for traffic received on the accelerator socket address.
        IpAddressType:
          allOf:
          - $ref: '#/components/schemas/IpAddressType'
          - description: The IP address type that an accelerator supports. For a custom routing accelerator, the value must be IPV4.
        DestinationTrafficState:
          allOf:
          - $ref: '#/components/schemas/CustomRoutingDestinationTrafficState'
          - description: Indicates whether or not a port mapping destination can receive traffic. The value is either ALLOW, if traffic is allowed to the destination, or DENY, if traffic is not allowed to the destination.
      description: The port mappings for a specified endpoint IP address (destination).
    PortNumber:
      type: integer
      minimum: 1
      maximum: 65535
    InvalidNextTokenException: {}
    EndpointNotFoundException: {}
    InternalServiceErrorException: {}
    CustomRoutingDestinationTrafficState:
      type: string
      enum:
      - ALLOW
      - DENY
    IpAddressType:
      type: string
      enum:
