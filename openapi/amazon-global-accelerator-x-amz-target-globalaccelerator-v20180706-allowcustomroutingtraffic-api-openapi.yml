paths:
  /#X-Amz-Target=GlobalAccelerator_V20180706.AllowCustomRoutingTraffic:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: AllowCustomRoutingTraffic
      description: '<p>Specify the Amazon EC2 instance (destination) IP addresses and ports for a VPC subnet endpoint that can receive traffic for a custom routing accelerator. You can allow traffic to all destinations in the subnet endpoint, or allow traffic to a specified list of destination IP addresses and ports in the subnet. Note that you cannot specify IP addresses or ports outside of the range that you configured for the endpoint group.</p> <p>After you make changes, you can verify that the updates are complete by checking the status of your accelerator: the status changes from IN_PROGRESS to DEPLOYED.</p>'
      responses:
        '200':
          description: Success
        '480':
          description: EndpointGroupNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointGroupNotFoundException'
              examples:
                AllowCustomRoutingTraffic480Example:
                  summary: Default AllowCustomRoutingTraffic 480 response
                  x-microcks-default: true
                  value:
                    acceleratorArn: arn:aws:globalaccelerator::123456789012:accelerator/abc123
                    status: DEPLOYED
        '481':
          description: InvalidArgumentException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidArgumentException'
              examples:
                AllowCustomRoutingTraffic481Example:
                  summary: Default AllowCustomRoutingTraffic 481 response
                  x-microcks-default: true
                  value:
                    acceleratorArn: arn:aws:globalaccelerator::123456789012:accelerator/abc123
                    status: DEPLOYED
        '482':
          description: InternalServiceErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServiceErrorException'
              examples:
                AllowCustomRoutingTraffic482Example:
                  summary: Default AllowCustomRoutingTraffic 482 response
                  x-microcks-default: true
                  value:
                    acceleratorArn: arn:aws:globalaccelerator::123456789012:accelerator/abc123
                    status: DEPLOYED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowCustomRoutingTrafficRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - GlobalAccelerator_V20180706.AllowCustomRoutingTraffic
      summary: Amazon Global Accelerator Allow Custom Routing Traffic
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=GlobalAccelerator V20180706.AllowCustomRoutingTraffic'
components:
  schemas:
    InvalidArgumentException: {}
    IpAddress:
      type: string
      maxLength: 45
    GenericString:
      type: string
      maxLength: 255
    DestinationPorts:
      type: array
      items:
        $ref: '#/components/schemas/PortNumber'
      maxItems: 100
    GenericBoolean:
      type: boolean
    DestinationAddresses:
      type: array
      items:
        $ref: '#/components/schemas/IpAddress'
      maxItems: 100
    InternalServiceErrorException: {}
    EndpointGroupNotFoundException: {}
    AllowCustomRoutingTrafficRequest:
      type: object
      required:
      - EndpointGroupArn
      - EndpointId
      title: AllowCustomRoutingTrafficRequest
      properties:
        EndpointGroupArn:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The Amazon Resource Name (ARN) of the endpoint group.
        EndpointId:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: An ID for the endpoint. For custom routing accelerators, this is the virtual private cloud (VPC) subnet ID.
        DestinationAddresses:
          allOf:
          - $ref: '#/components/schemas/DestinationAddresses'
          - description: <p>A list of specific Amazon EC2 instance IP addresses (destination addresses) in a subnet that you want to allow to receive traffic. The IP addresses must be a subset of the IP addresses that you specified for the endpoint group.</p> <p> <code>DestinationAddresses</code> is required if <code>AllowAllTrafficToEndpoint</code> is <code>FALSE</code> or is not specified.</p>
        DestinationPorts:
          allOf:
          - $ref: '#/components/schemas/DestinationPorts'
          - description: A list of specific Amazon EC2 instance ports (destination ports) that you want to allow to receive traffic.
        AllowAllTrafficToEndpoint:
          allOf:
          - $ref: '#/components/schemas/GenericBoolean'
          - description: <p>Indicates whether all destination IP addresses and ports for a specified VPC subnet endpoint can receive traffic from a custom routing accelerator. The value is TRUE or FALSE. </p> <p>When set to TRUE, <i>all</i> destinations in the custom routing VPC subnet can receive traffic. Note that you cannot specify destination IP addresses and ports when the value is set to TRUE.</p> <p>When set to FALSE (or not specified), you <i>must</i> specify a list of destination IP addresses that are allowed to receive traffic. A list of ports is optional. If you don't specify a list of ports, the ports that can accept traffic is the same as the ports configured for the endpoint group.</p> <p>The default value is FALSE.</p>
    PortNumber:
      type: integer
      minimum: 1
      maximum: 65535
  parameters:
    X-Amz-Signature:
