apis:
  - name: Amazon Global Accelerator API
    description: >-
      The Amazon Global Accelerator API enables programmatic access to create
      and manage accelerators, listeners, and endpoint groups. You can
      configure traffic routing, health checks, and client IP address
      preservation to optimize application performance across AWS Regions.
