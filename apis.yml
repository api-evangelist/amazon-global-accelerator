aid: amazon-global-accelerator
name: Amazon Global Accelerator
description: >-
  Amazon Global Accelerator is a networking service that improves the
  performance and availability of applications with local or global users.
  It provides static IP addresses that act as a fixed entry point to your
  applications and uses the AWS global network to optimize the path from
  users to applications, improving performance by up to 60%.
